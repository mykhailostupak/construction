name: Sync Jobs

on:
  schedule:
    - cron: '0 4,8,12,16 * * *'   # 4 AM, 8 AM, 12 PM, 4 PM UTC
  workflow_dispatch:
    inputs:
      telegram_chat_id:
        description: 'Telegram chat ID to notify on completion'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        env:
          SHEET_ID: ${{ vars.SHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ github.event.inputs.telegram_chat_id }}
        run: node scripts/sync.js

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json data/translations.json
          git diff --staged --quiet || git commit -m "chore: sync jobs from Google Sheet [skip ci]"
          git push
